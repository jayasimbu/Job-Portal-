<!-- Shared Navigation Bar for Career Auto -->
<!-- This will be injected into all pages except login/registration pages -->
<header
  id="career-auto-nav"
  class="sticky top-0 z-50 w-full bg-white dark:bg-[#1a2632] border-b border-[#e7edf3] dark:border-[#2a3b4d]"
>
  <div class="layout-container flex h-full grow flex-col">
    <div class="px-4 md:px-10 flex flex-1 justify-center py-3">
      <div
        class="layout-content-container flex w-full max-w-[1200px] items-center justify-between whitespace-nowrap"
      >
        <!-- Logo and Brand -->
        <a
          href="../Platform/Home/smart_job_portal_home_page.html"
          class="flex items-center gap-4 text-[#0d141b] dark:text-white hover:opacity-80 transition-opacity cursor-pointer decoration-0"
          title="Go to HomePage"
        >
          <div class="flex items-center justify-center text-primary">
            <img
              src="../assets/logos/career_auto_logo.png"
              class="h-8 object-cover rounded-full w-8"
              alt="Career Auto Logo"
            />
          </div>
          <h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">
            Career Auto
          </h2>
        </a>

        <!-- Desktop Navigation -->
        <div class="hidden md:flex flex-1 justify-center gap-9">
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="../Platform/Home/smart_job_portal_home_page.html"
            >Home</a
          >
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="../Platform/Search/advanced_job_search_&_filtering.html"
            >Jobs</a
          >
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="../Employer/Dashboard/employer_dashboard_overview.html"
            >Companies</a
          >
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="../Platform/Intelligence/about_the_intelligence_platform.html"
            >About</a
          >
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="#"
            >Pricing</a
          >
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="../Platform/Intelligence/interactive_how_it_works_guide.html"
            >How It Works</a
          >
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="#"
            >Pricing</a
          >
          <a
            class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors"
            href="../Platform/SiteMap/site_map.html"
            >Site Map</a
          >
        </div>

        <!-- Desktop Action Buttons -->
        <div class="hidden md:flex gap-3">
          <button
            onclick="
              window.location.href = '../Platform/Auth/auth_center.html?tab=login'
            "
            class="flex h-10 cursor-pointer items-center justify-center rounded-lg px-4 bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-[#0d141b] dark:text-white text-sm font-bold transition-colors"
          >
            <span class="truncate">Log In</span>
          </button>
          <button
            onclick="
              window.location.href =
                '../Platform/Auth/auth_center.html?tab=signup'
            "
            class="flex h-10 cursor-pointer items-center justify-center rounded-lg px-4 bg-primary hover:bg-primary/90 text-white text-sm font-bold transition-colors shadow-lg shadow-primary/20"
          >
            <span class="truncate">Get Started</span>
          </button>
        </div>

        <!-- Mobile Hamburger Menu -->
        <button
          id="mobile-menu-toggle"
          class="md:hidden flex items-center justify-center w-10 h-10 text-[#0d141b] dark:text-white"
        >
          <span class="material-symbols-outlined text-2xl">menu</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu Panel (Hidden by default) -->
  <div
    id="mobile-menu"
    class="hidden absolute top-full left-0 w-full bg-white dark:bg-[#1a2632] border-b border-[#e7edf3] dark:border-[#2a3441] shadow-xl z-50 md:hidden"
  >
    <nav class="flex flex-col px-4 py-4 gap-4">
      <a
        class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors py-2"
        href="../Platform/Home/smart_job_portal_home_page.html"
        >Home</a
      >
      <a
        class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors py-2"
        href="../Platform/Search/advanced_job_search_&_filtering.html"
        >Jobs</a
      >
      <a
        class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors py-2"
        href="../Employer/Dashboard/employer_dashboard_overview.html"
        >Companies</a
      >
      <a
        class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors py-2"
        href="../Platform/Intelligence/about_the_intelligence_platform.html"
        >About</a
      >
      <a
        class="text-[#0d141b] dark:text-slate-200 text-sm font-medium hover:text-primary transition-colors py-2"
        href="#"
        >Pricing</a
      >
      <hr class="border-[#e7edf3] dark:border-[#2a3b4d]" />
      <button
        onclick="
          window.location.href = '../Platform/Auth/auth_center.html?tab=login'
        "
        class="flex h-10 cursor-pointer items-center justify-center rounded-lg px-4 bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-[#0d141b] dark:text-white text-sm font-bold transition-colors"
      >
        Log In
      </button>
      <button
        onclick="
          window.location.href = '../Platform/Auth/auth_center.html?tab=signup'
        "
        class="flex h-10 cursor-pointer items-center justify-center rounded-lg px-4 bg-primary hover:bg-primary/90 text-white text-sm font-bold transition-colors shadow-lg shadow-primary/20"
      >
        Get Started
      </button>
    </nav>
  </div>
</header>
