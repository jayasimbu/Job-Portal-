<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>System Status — Career Auto</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
      }

      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.5s ease both;
      }
    </style>
  </head>

  <body
    class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col"
  >
    <!-- Header -->
    <div id="header-container"></div>
    <script src="../../assets/js/render_header.js"></script>

    <!-- Blurred bg for logout modal mode -->
    <div
      id="blur-bg"
      class="hidden fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-40"
    ></div>

    <!-- Status Card -->
    <main class="flex-1 flex items-center justify-center p-6">
      <div
        id="status-card"
        class="fade-in w-full max-w-lg bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800 p-8 md:p-10 text-center relative z-50"
      ></div>
    </main>

    <!-- Footer -->
    <!-- Footer Container -->
    <div id="footer-container"></div>
    <script src="../../assets/js/render_footer.js"></script>

    <script src="../../assets/js/navbar.js"></script>
    <script>
      // ── CONFIG ──────────────────────────────────────────────────────────
      const CONFIGS = {
        denied: {
          icon: "lock",
          iconBg: "bg-blue-50 dark:bg-blue-900/20",
          iconColor: "text-blue-600",
          badge: "Error 403",
          badgeColor: "text-blue-600",
          title: "Access Denied",
          message:
            "You don't have permission to view this page. This area may be restricted to a specific account type.",
          actions: [
            {
              label: "Return to Dashboard",
              icon: "dashboard",
              href: "../../JobSeeker/Dashboard/job_seeker_dashboard_intelligence.html",
              primary: true,
            },
            {
              label: "Go Home",
              icon: "home",
              href: "../Home/smart_job_portal_home_page.html",
              primary: false,
            },
          ],
          helper: {
            text: "Think this is a mistake?",
            sub: "Contact our support team for help.",
            link: "../Intelligence/about_the_intelligence_platform.html#contact",
            linkText: "Contact Support",
          },
        },
        timeout: {
          icon: "timer_off",
          iconBg: "bg-amber-50 dark:bg-amber-900/20",
          iconColor: "text-amber-500",
          badge: "Session Expired",
          badgeColor: "text-amber-500",
          title: "Your Session Has Timed Out",
          message:
            "Your session expired due to inactivity. Please log in again to continue where you left off.",
          actions: [
            {
              label: "Log In Again",
              icon: "login",
              href: "../Auth/auth_center.html?tab=login",
              primary: true,
            },
            {
              label: "Go Home",
              icon: "home",
              href: "../Home/smart_job_portal_home_page.html",
              primary: false,
            },
          ],
          helper: {
            text: "Experiencing issues?",
            sub: "Reach out to our support team.",
            link: "../Intelligence/about_the_intelligence_platform.html#contact",
            linkText: "Get Help",
          },
        },
        maintenance: {
          icon: "build",
          iconBg: "bg-slate-100 dark:bg-slate-800",
          iconColor: "text-slate-500",
          badge: "Scheduled Maintenance",
          badgeColor: "text-slate-500",
          title: "We'll Be Right Back",
          message:
            "Career Auto is currently undergoing scheduled maintenance to improve your experience. We'll be back shortly. Thank you for your patience!",
          actions: [
            {
              label: "Check Status",
              icon: "refresh",
              href: "javascript:location.reload()",
              primary: true,
            },
            {
              label: "Help Center",
              icon: "help",
              href: "../Intelligence/about_the_intelligence_platform.html#help",
              primary: false,
            },
          ],
          helper: {
            text: "Need urgent help?",
            sub: "Our team is available via email.",
            link: "../Intelligence/about_the_intelligence_platform.html#contact",
            linkText: "Contact Us",
          },
        },
        update: {
          icon: "system_update",
          iconBg: "bg-green-50 dark:bg-green-900/20",
          iconColor: "text-green-600",
          badge: "System Update",
          badgeColor: "text-green-600",
          title: "Platform Update Deployed",
          message:
            "We've rolled out improvements to Career Auto. Your experience has been enhanced with new features and performance improvements.",
          actions: [
            {
              label: "Continue to App",
              icon: "arrow_forward",
              href: "../Home/smart_job_portal_home_page.html",
              primary: true,
            },
            {
              label: "What's New",
              icon: "new_releases",
              href: "../Intelligence/about_the_intelligence_platform.html",
              primary: false,
            },
          ],
          helper: null,
        },
        logout: {
          icon: "logout",
          iconBg: "bg-red-50 dark:bg-red-900/20",
          iconColor: "text-red-500",
          badge: null,
          badgeColor: "",
          title: "Are you sure you want to log out?",
          message:
            "Any unsaved changes will be lost. Make sure you've saved your work before leaving.",
          actions: [
            {
              label: "Yes, Log Out",
              icon: "logout",
              href: null,
              id: "confirm-logout-btn",
              primary: true,
              danger: true,
            },
            {
              label: "Stay Logged In",
              icon: "person",
              href: "../../JobSeeker/Dashboard/job_seeker_dashboard_intelligence.html",
              primary: false,
            },
          ],
          helper: null,
          modal: true,
        },
      };

      // ── INIT ─────────────────────────────────────────────────────────────
      function getType() {
        const params = new URLSearchParams(window.location.search);
        return params.get("type") || "denied";
      }

      function buildActionBtn(action) {
        if (action.id === "confirm-logout-btn") {
          return `<button id="confirm-logout-btn" class="flex w-full items-center justify-center gap-2 rounded-xl py-3.5 px-6 text-sm font-bold transition-all bg-red-600 hover:bg-red-700 text-white shadow-md">
                    <span class="material-symbols-outlined text-[20px]">${action.icon}</span>${action.label}
                </button>`;
        }
        const base = action.primary
          ? "bg-blue-600 hover:bg-blue-700 text-white shadow-md shadow-blue-500/20"
          : "bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700";
        return `<a href="${action.href}" class="flex w-full items-center justify-center gap-2 rounded-xl py-3.5 px-6 text-sm font-bold transition-all ${base}">
                <span class="material-symbols-outlined text-[20px]">${action.icon}</span>${action.label}
            </a>`;
      }

      function render() {
        const type = getType();
        const cfg = CONFIGS[type] || CONFIGS["denied"];
        const card = document.getElementById("status-card");

        let helperHTML = "";
        if (cfg.helper) {
          helperHTML = `
                <div class="mt-8 flex flex-col sm:flex-row items-center justify-between gap-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 p-4">
                    <div class="text-left">
                        <p class="text-sm font-bold text-slate-800 dark:text-white">${cfg.helper.text}</p>
                        <p class="text-xs text-slate-500">${cfg.helper.sub}</p>
                    </div>
                    <a href="${cfg.helper.link}" class="text-sm font-bold text-blue-600 hover:text-blue-700 flex items-center gap-1 whitespace-nowrap">
                        ${cfg.helper.linkText} <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
                    </a>
                </div>`;
        }

        card.innerHTML = `
                <div class="flex flex-col items-center gap-6">
                    <div class="w-24 h-24 rounded-full ${cfg.iconBg} flex items-center justify-center">
                        <span class="material-symbols-outlined text-5xl ${cfg.iconColor}">${cfg.icon}</span>
                    </div>
                    <div class="space-y-3">
                        ${cfg.badge ? `<p class="text-xs font-bold tracking-widest uppercase ${cfg.badgeColor}">${cfg.badge}</p>` : ""}
                        <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 dark:text-white">${cfg.title}</h1>
                        <p class="text-slate-500 dark:text-slate-400 max-w-md mx-auto leading-relaxed">${cfg.message}</p>
                    </div>
                    <div class="flex flex-col gap-3 w-full max-w-sm mt-2">
                        ${cfg.actions.map(buildActionBtn).join("")}
                    </div>
                    ${helperHTML}
                </div>
            `;

        // Logout confirmation logic
        if (type === "logout") {
          var blurBg = document.getElementById("blur-bg");
          if (blurBg) blurBg.classList.remove("hidden");
          const btn = document.getElementById("confirm-logout-btn");
          if (btn) {
            btn.addEventListener("click", () => {
              localStorage.removeItem("user");
              sessionStorage.clear();
              window.location.href =
                "../Home/smart_job_portal_home_page.html";
            });
          }
        }
      }

      // DOM is already parsed since this script is at end of body
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", render);
      } else {
        render();
      }
    </script>
  </body>
</html>
