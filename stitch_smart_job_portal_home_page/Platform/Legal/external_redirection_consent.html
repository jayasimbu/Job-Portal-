<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Career Auto - AI-Powered Career Platform</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script src="external_redirection_consent.js"></script>
    <script src="external_redirection_consent_func.js"></script>

    <link rel="stylesheet" href="external_redirection_consent.css" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-[#0d141b] dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden"
  >
    <!-- ── Role Guard: jobseeker only ────────────────────────────── -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("user");
          if (!raw) {
            sessionStorage.setItem("redirectAfterLogin", window.location.href);
            window.location.replace(
              "../Auth/auth_center.html?tab=login",
            );
            return;
          }
          var user = JSON.parse(raw);
          if (!(user && (user.email || user.googleId || user.name))) {
            sessionStorage.setItem("redirectAfterLogin", window.location.href);
            window.location.replace(
              "../Auth/auth_center.html?tab=login",
            );
            return;
          }
          var role = user.role || "jobseeker";
          if (role !== "jobseeker") {
            window.location.replace(
              "../../Employer/Dashboard/employer_dashboard_overview.html",
            );
          }
        } catch (e) {
          window.location.replace("../Auth/auth_center.html?tab=login";
        }
      })();
    </script>

    <!-- Header -->
    <!-- Shared Navigation Bar for Career Auto -->
    <!-- This will be injected into all pages except login/registration pages -->

    <!-- Header -->
    <div id="header-container"></div>
    <script src="../../assets/js/auth_guard.js"></script>
    <script src="../../assets/js/render_header.js"></script>

    <!-- Main Content Area -->
    <main
      class="flex-1 flex flex-col justify-center items-center px-4 py-12 relative"
    >
      <!-- Blurred Background Elements for visual depth -->
      <div
        class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-3xl pointer-events-none -z-10"
      ></div>
      <div
        class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl pointer-events-none -z-10"
      ></div>
      <!-- Modal Card -->
      <div
        class="w-full max-w-[560px] bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-[#e7edf3] dark:border-slate-700 overflow-hidden flex flex-col"
      >
        <!-- Top Warning Icon -->
        <div class="pt-10 pb-4 flex justify-center">
          <div
            class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-primary"
          >
            <span class="material-symbols-outlined text-[32px]"
              >public_off</span
            >
          </div>
        </div>
        <!-- Content Body -->
        <div class="flex flex-col gap-6 px-8 pb-8 text-center">
          <div class="flex flex-col gap-3">
            <h1
              class="text-[#0d141b] dark:text-white text-2xl font-bold leading-tight tracking-tight"
            >
              You are leaving our platform
            </h1>
            <p
              class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed"
            >
              You are about to visit an external website. We are not responsible
              for the content, privacy policies, or practices of third-party
              sites.
            </p>
          </div>
          <!-- Destination URL Card -->
          <div
            class="flex flex-col gap-3 p-4 rounded-lg border border-[#cfdbe7] dark:border-slate-600 bg-slate-50 dark:bg-slate-750 dark:bg-slate-900/50 text-left"
          >
            <div class="flex items-center gap-3">
              <div
                class="text-primary flex items-center justify-center bg-white dark:bg-slate-800 p-2 rounded-lg shadow-sm border border-slate-100 dark:border-slate-700"
              >
                <span class="material-symbols-outlined">link</span>
              </div>
              <div class="flex flex-col overflow-hidden">
                <h2
                  class="text-[#0d141b] dark:text-slate-200 text-sm font-bold leading-tight"
                >
                  Destination URL
                </h2>
                <p
                  class="text-primary text-sm font-medium leading-normal truncate"
                >
                  https://www.linkedin.com/in/profile-example/details
                </p>
              </div>
            </div>
          </div>
          <!-- Buttons -->
          <div class="flex flex-col-reverse sm:flex-row gap-3 mt-2">
            <button
              class="flex-1 h-12 px-6 rounded-xl border border-[#cfdbe7] dark:border-slate-600 bg-transparent text-[#0d141b] dark:text-slate-200 text-base font-bold hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors focus:ring-2 focus:ring-slate-200 focus:outline-none"
            >
              Stay Here
            </button>
            <button
              class="flex-1 h-12 px-6 rounded-xl bg-primary text-white text-base font-bold shadow-md shadow-primary/20 hover:bg-primary/90 transition-all focus:ring-2 focus:ring-primary/50 focus:outline-none flex items-center justify-center gap-2"
            >
              <span>Proceed to Site</span>
              <span class="material-symbols-outlined text-sm">open_in_new</span>
            </button>
          </div>
          <!-- Checkbox -->
          <div
            class="border-t border-[#e7edf3] dark:border-slate-700 pt-4 mt-2"
          >
            <label
              class="flex items-center justify-center gap-3 cursor-pointer group"
            >
              <div class="relative flex items-center">
                <input
                  class="peer h-5 w-5 rounded border-2 border-[#cfdbe7] dark:border-slate-600 bg-transparent text-primary checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 transition-all cursor-pointer"
                  type="checkbox"
                />
              </div>
              <span
                class="text-slate-500 dark:text-slate-400 text-sm font-medium group-hover:text-slate-700 dark:group-hover:text-slate-200 transition-colors"
              >
                Don't show this message again
              </span>
            </label>
          </div>
        </div>
        <!-- Security / Trust Footer within Card -->
        <div
          class="bg-slate-50 dark:bg-slate-900/50 px-8 py-3 border-t border-[#e7edf3] dark:border-slate-700 flex justify-center items-center gap-2"
        >
          <span class="material-symbols-outlined text-slate-400 text-sm"
            >lock</span
          >
          <span class="text-xs font-medium text-slate-400"
            >Secure Redirection</span
          >
        </div>
      </div>
    </main>
    <!-- Page Footer -->
    <!-- Footer Container -->
    <div id="footer-container"></div>
    <script src="../../assets/js/render_footer.js"></script>
    <!-- Dark Mode Toggle Logic (Optional for preview but good for completeness) -->

    <script src="../../assets/js/navbar.js"></script>
  </body>
</html>
