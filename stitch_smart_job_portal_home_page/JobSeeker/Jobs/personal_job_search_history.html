<!doctype html>

<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Career Auto - AI-Powered Career Platform</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="personal_job_search_history.js"></script>
</head>

<body
  class="bg-background-light dark:bg-background-dark font-display text-[#0d141b] dark:text-white overflow-x-hidden min-h-screen flex flex-col">
  <!-- ── Role Guard: jobseeker only ────────────────────────────── -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem("user");
        if (!raw) {
          sessionStorage.setItem("redirectAfterLogin", window.location.href);
          window.location.replace(
            "../../Platform/Auth/auth_center.html?tab=login",
          );
          return;
        }
        var user = JSON.parse(raw);
        if (!(user && (user.email || user.googleId || user.name))) {
          sessionStorage.setItem("redirectAfterLogin", window.location.href);
          window.location.replace(
            "../../Platform/Auth/auth_center.html?tab=login",
          );
          return;
        }
        var role = user.role || "jobseeker";
        if (role !== "jobseeker") {
          window.location.replace(
            "../../Employer/Dashboard/employer_dashboard_overview.html",
          );
        }
      } catch (e) {
        window.location.replace("../../Platform/Auth/auth_center.html?tab=login";
      }
    })();
  </script>

  <!-- Top Navigation -->
  <!-- Header -->
  <div id="header-container"></div>
  <script src="../../assets/js/auth_guard.js"></script>
  <script src="../../assets/js/render_header.js"></script>

  <!-- Sidebar -->
  <div id="sidebar-container"></div>
  <script src="../../assets/js/render_sidebar.js"></script>

  <!-- Main Content -->
  <main class="flex-grow layout-container flex flex-col items-center py-4 px-4 md:px-10">
    <div class="w-full max-w-[960px] flex flex-col gap-6">
      <!-- Page Heading -->
      <div
        class="flex flex-wrap items-end justify-between gap-4 p-4 rounded-2xl bg-white dark:bg-[#1a2632] shadow-sm border border-slate-100 dark:border-slate-800">
        <div class="flex flex-col gap-0.5">
          <h1 class="text-[#0d141b] dark:text-white text-xl md:text-2xl font-extrabold tracking-tight">
            Search History
          </h1>
          <p class="text-[#4c739a] dark:text-slate-400 text-[10px] font-medium">
            View and manage your recent job search activity.
          </p>
        </div>
        <button id="clear-all-btn"
          class="flex items-center gap-1.5 px-2.5 h-7 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 text-[10px] font-bold transition-colors">
          <span class="material-symbols-outlined text-[14px]">delete_sweep</span>
          <span>Clear All</span>
        </button>
      </div>

      <!-- Actions Bar (Filters & Sorting) -->
      <div class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-transparent">
        <div class="flex gap-3 overflow-x-auto pb-2 sm:pb-0 w-full sm:w-auto scrollbar-hide relative">
          <!-- Keyword Filter Button -->
          <div class="relative">
            <button id="keyword-btn"
              class="flex items-center gap-1.5 bg-white dark:bg-[#1a2632] border border-[#e7edf3] dark:border-[#2a3b4d] rounded-full px-2.5 py-1 hover:bg-gray-50 dark:hover:bg-[#23303d] transition-colors shrink-0">
              <span class="material-symbols-outlined text-[#4c739a] text-[16px]">filter_list</span>
              <span id="keyword-label" class="text-[#0d141b] dark:text-white text-[10px] font-medium">Keywords</span>
            </button>
            <!-- Keyword Dropdown -->
            <div id="keyword-dropdown"
              class="hidden absolute top-full left-0 mt-2 z-50 bg-white dark:bg-[#1a2632] border border-slate-200 dark:border-slate-700 rounded-2xl shadow-xl p-3 w-64">
              <input id="keyword-input" type="text" placeholder="Filter by job title..."
                class="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm text-[#0d141b] dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
              <button id="keyword-clear" class="mt-2 text-xs text-slate-400 hover:text-red-500 transition-colors">
                Clear keyword
              </button>
            </div>
          </div>

          <!-- Sort Button -->
          <button id="sort-btn"
            class="flex items-center gap-1.5 bg-white dark:bg-[#1a2632] border border-[#e7edf3] dark:border-[#2a3b4d] rounded-full px-2.5 py-1 hover:bg-gray-50 dark:hover:bg-[#23303d] transition-colors shrink-0">
            <span class="material-symbols-outlined text-[#4c739a] text-[16px]">sort</span>
            <span id="sort-label" class="text-[#0d141b] dark:text-white text-[10px] font-medium">Sort: Newest</span>
          </button>
        </div>
        <div id="result-count" class="text-[#4c739a] text-[10px] font-medium">
          Showing 0 recent searches
        </div>
      </div>

      <!-- List Container (dynamically rendered) -->
      <div id="history-list" class="flex flex-col gap-3"></div>

      <!-- Empty State (shown when list is empty) -->
      <div id="empty-state"
        class="hidden text-center py-10 bg-white dark:bg-[#1a2632] rounded-2xl border border-dashed border-slate-300 dark:border-slate-700">
        <span class="material-symbols-outlined text-4xl text-slate-300 mb-2 block">manage_search</span>
        <h3 class="text-base font-bold text-slate-700 dark:text-slate-300 mb-1">
          No search history yet
        </h3>
        <p class="text-xs text-slate-500 dark:text-slate-400 mb-4">
          Start searching for jobs to see your history here.
        </p>
        <a href="../../Platform/Search/advanced_job_search_&_filtering.html"
          class="inline-flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-xl hover:bg-blue-600 transition-colors font-bold text-xs">
          <span class="material-symbols-outlined text-[16px]">search</span>
          Browse Jobs
        </a>
      </div>

      <!-- Pagination (dynamically rendered) -->
      <div id="pagination-container" class="flex justify-center mt-2"></div>
    </div>
  </main>

  <script src="../../assets/js/navbar.js"></script>
  <script src="personal_job_search_history_func.js"></script>
</body>

</html>
